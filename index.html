<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="description" content="Classic to do list single page web application">
        <meta name="keywords" content="todo list classic interactive">

        <link rel="stylesheet" href="reset.css">
        <link rel="stylesheet" href="index.css">
        <script src="https://kit.fontawesome.com/7ff7fc46f1.js" crossorigin="anonymous"></script>
        <title>Something To Do</title>
    </head>

    <body>
        <div class="container">
            <header>
                <h1>Something To Do</h1> 
                
                <div>
                    
                    <div id="header-input">
                        <button id="decrement" onclick="timer.stepDown()">-</button>
                        <input type="number" id="timer" name="timer" min="30" max="900" value="30" step="5">
                        <button id="increment" onclick="timer.stepUp()">+</button>

                        <div class="quickset">
                            <button data-value="300">5 min</button>
                            <button data-value="600">10 min</button>
                            <button data-value="900">15 min</button>
                        </div>
                    </div>
                    
                    <button id="start-timer">Start Timer</button>
                </div>
            </header>
    
            <div id="timer-display"></div>
    
            <div class="buttons">
                <button id="add-activity">Add</button>
            </div>
            <br>
            <hr>
               
            <ul id="activities"></ul>
            
        </div>

        <script src="script.js"></script>
    </body>
</html>
